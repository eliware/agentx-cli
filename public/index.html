<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AgentX GUI</title>
    <link rel="stylesheet" href="/dist/app.bundle.css">
    <script type="module" src="/dist/app.bundle.mjs" defer></script>
  </head>
  <body>
    <main class="shell">

      </dl>
    </main>
  </body>
</html>
